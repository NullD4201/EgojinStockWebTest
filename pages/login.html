<div class="card" style="max-width: 500px; margin: 100px auto;">
    <div class="card-header text-center">
        <h1 class="card-title">QR 재고관리 시스템</h1>
        <p class="card-subtitle">로그인하여 시스템을 이용하세요</p>
    </div>

    <form id="login-form">
        <div class="form-group">
            <label class="form-label">이메일</label>
            <input type="email" id="email" class="form-input" placeholder="이메일을 입력하세요" required>
        </div>

        <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하세요" required>
        </div>

        <div class="form-group">
            <label class="form-checkbox">
                <input type="checkbox" id="remember-me">
                <span>자동 로그인</span>
            </label>
        </div>

        <div id="error-message" class="hidden"
            style="color: var(--color-error); margin-bottom: var(--spacing-md); font-size: var(--font-size-sm);"></div>

        <button type="submit" class="btn btn-primary w-full">로그인</button>
    </form>
