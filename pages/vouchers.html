<div class="card">
    <div class="card-header flex justify-between items-center">
        <div>
            <h1 class="card-title">전표 관리</h1>
        </div>
        <button class="btn btn-primary" id="create-voucher-btn">+ 전표 생성</button>
    </div>

    <div id="vouchers-list"></div>
</div>

<!-- Create Voucher Modal -->
<div id="voucher-modal" class="modal-overlay hidden">
    <div class="card" style="max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto;">
        <div class="card-header">
            <h2 class="card-title">전표 생성</h2>
        </div>

        <form id="voucher-form">
            <div class="form-group">
                <label class="form-label">구분 *</label>
                <div class="voucher-type-toggle" id="voucher-type-toggle">
                    <button type="button" class="toggle-btn active" data-value="product">상품</button>
                    <button type="button" class="toggle-btn" data-value="part">부속</button>
                </div>
                <input type="hidden" id="voucher-type" value="product">
            </div>

            <!-- 상품 모드: 상품 검색 → 아코디언 부속 목록 -->
            <div id="product-mode-section">
                <div class="form-group">
                    <label class="form-label">상품 검색</label>
                    <input type="text" class="form-input" id="voucher-product-search" placeholder="상품명 또는 관리코드로 검색">
                    <div id="voucher-product-results" style="max-height: 200px; overflow-y: auto; margin-top: var(--spacing-xs);"></div>
                </div>
                <div id="product-accordion-list"></div>
            </div>

            <!-- 부속 모드: 관리코드로 추가 -->
            <div id="part-mode-section" style="display: none;">
                <div class="form-group">
                    <label class="form-label">부속 추가</label>
                    <div class="flex gap-sm">
                        <input type="text" class="form-input" id="part-code-input" placeholder="관리코드 입력" style="flex: 1;">
                        <button type="button" class="btn btn-secondary" id="add-part-by-code-btn">추가</button>
                    </div>
                    <div id="part-code-message" style="margin-top: var(--spacing-xs); font-size: var(--font-size-sm);"></div>
                </div>
                <div id="manual-parts-list" class="parts-checklist"></div>
            </div>

            <div class="form-group">
                <label class="form-label">예정일 *</label>
                <div id="inline-calendar" class="inline-calendar"></div>
                <input type="hidden" id="voucher-date">
            </div>

            <div class="flex gap-md">
                <button type="submit" class="btn btn-primary">생성</button>
                <button type="button" class="btn btn-secondary" id="cancel-voucher-btn">취소</button>
            </div>
        </form>
    </div>
</div>
