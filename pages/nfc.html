<div class="card">
    <div class="card-header text-center">
        <h1 class="card-title" id="nfc-page-title">NFC 태그인식</h1>
    </div>

    <div id="nfc-container" style="max-width: 600px; margin: 0 auto;">
        <!-- NFC 모드 -->
        <div id="nfc-status" style="text-align: center; padding: var(--spacing-xl) 0;">
            <div id="nfc-icon" style="font-size: 64px; margin-bottom: var(--spacing-md); animation: nfc-pulse 2s infinite;">📡</div>
            <p id="nfc-status-text" style="font-size: var(--font-size-lg); font-weight: 600; margin-bottom: var(--spacing-sm);">NFC 태그를 인식해주세요</p>
            <p style="color: var(--color-text-tertiary); font-size: var(--font-size-sm);">기기 뒷면에 NFC 태그를 가까이 대주세요</p>
        </div>

        <!-- QR 대체 모드 -->
        <div id="qr-fallback" class="hidden">
            <div id="nfc-qr-reader" style="border-radius: var(--radius-lg); overflow: hidden; margin-bottom: var(--spacing-lg);"></div>
            <div id="qr-fallback-prompt" class="text-center" style="padding: var(--spacing-xl) 0;">
                <p style="font-size: 48px; margin-bottom: var(--spacing-md);">📷</p>
                <p style="color: var(--color-text-secondary); margin-bottom: var(--spacing-lg);">이 기기는 NFC를 지원하지 않아 QR 스캔으로 대체합니다</p>
                <button class="btn btn-primary" id="qr-fallback-start-btn" style="font-size: var(--font-size-lg); padding: var(--spacing-sm) var(--spacing-xl);">카메라 시작</button>
            </div>
        </div>

        <div id="nfc-result" class="hidden"></div>

        <div class="text-center" style="margin-top: var(--spacing-lg);">
            <button class="btn btn-secondary" id="nfc-test-btn">테스트 태그</button>
        </div>
    </div>
</div>

<style>
    @keyframes nfc-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.7; }
    }
</style>
